<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- WebAutomate brand mark: a rounded-square badge with a stylised "W" formed
       from automation/flow nodes, over a subtle circuit motif. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0c2461" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="url(#bg)" filter="url(#soft)"/>

  <!-- Faint circuit traces -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M90 150 H150 a16 16 0 0 1 16 16 V210"/>
    <path d="M422 150 H362 a16 16 0 0 0 -16 16 V210"/>
    <path d="M90 362 H150 a16 16 0 0 0 16 -16 V300"/>
    <path d="M422 362 H362 a16 16 0 0 1 -16 -16 V300"/>
    <circle cx="90" cy="150" r="7" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
    <circle cx="422" cy="150" r="7" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
    <circle cx="90" cy="362" r="7" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
    <circle cx="422" cy="362" r="7" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
  </g>

  <!-- Stylised "W" as a continuous automation flow path -->
  <path d="M128 168 L186 344 L256 224 L326 344 L384 168"
        fill="none" stroke="#ffffff" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flow nodes at the vertices -->
  <circle cx="128" cy="168" r="26" fill="#ffffff"/>
  <circle cx="384" cy="168" r="26" fill="#ffffff"/>
  <circle cx="256" cy="224" r="22" fill="#ffffff"/>
  <circle cx="186" cy="344" r="20" fill="#ffffff"/>
  <circle cx="326" cy="344" r="20" fill="#ffffff"/>

  <!-- Automation spark over the centre node -->
  <path d="M262 196 L242 232 L256 232 L250 262 L276 224 L260 224 Z" fill="url(#spark)"/>
</svg>
